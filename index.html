<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RugChecker • phythecreator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .score-circle { width: 180px; height: 180px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; box-shadow: 0 0 30px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-2xl mx-auto p-6">
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold flex items-center justify-center gap-3">
        🛡️ RugChecker
        <span class="text-emerald-400 text-3xl">by phythecreator</span>
      </h1>
      <p class="text-zinc-400 mt-2">Analisador de Rug Pull • Memecoins Solana • Score 0-100</p>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-8 shadow-2xl">
      <div class="flex gap-3">
        <input 
          id="caInput"
          type="text" 
          placeholder="Cole o Contract Address (CA) aqui..."
          class="flex-1 bg-zinc-800 text-white px-6 py-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-lg"
        >
        <button onclick="analisarToken()" 
          class="bg-emerald-500 hover:bg-emerald-600 px-10 rounded-2xl font-bold text-lg transition">
          ANALISAR
        </button>
      </div>

      <div id="loading" class="hidden mt-8 text-center">
        <i class="fas fa-spinner fa-spin text-4xl text-emerald-400"></i>
        <p class="mt-4 text-zinc-400">A pesquisar na Dexscreener...</p>
      </div>

      <div id="result" class="hidden mt-8"></div>
    </div>

    <div class="text-center mt-10 text-zinc-500 text-sm">
      Dados em tempo real da Dexscreener • Apenas Solana • 100% client-side<br>
      <span class="text-emerald-400">Open source • phythecreator</span>
    </div>
  </div>

  <script>
    async function analisarToken() {
      const ca = document.getElementById('caInput').value.trim();
      const loading = document.getElementById('loading');
      const resultDiv = document.getElementById('result');

      if (!ca || ca.length < 30) {
        alert("❌ Insere um Contract Address válido da Solana!");
        return;
      }

      loading.classList.remove('hidden');
      resultDiv.classList.add('hidden');

      try {
        // Usa proxy CORS para funcionar em qualquer sitio (GitHub Pages, ficheiro local, etc.)
        const apiUrl = `https://api.dexscreener.com/latest/dex/tokens/${ca}`;
        const proxyUrl = `https://corsproxy.io/?` + encodeURIComponent(apiUrl);
        
        const res = await fetch(proxyUrl);
        const data = await res.json();

        if (!data.pairs || data.pairs.length === 0) {
          throw new Error("Token não encontrado ou sem pool na Dexscreener.");
        }

        const pair = data.pairs[0];

        const tokenName = pair.baseToken.name || "Unknown";
        const tokenSymbol = pair.baseToken.symbol || "???";
        const liquidity = pair.liquidity?.usd || 0;
        const volume24h = pair.volume?.h24 || 0;
        const fdv = pair.fdv || 0;
        const price = pair.priceUsd || 0;
        const pairCreatedAt = pair.pairCreatedAt;
        const tx24h = (pair.txns?.h24?.buys || 0) + (pair.txns?.h24?.sells || 0);

        // Cálculo do Score 0-100 (quanto maior = mais perigoso)
        let score = 0;
        let reasons = [];

        if (liquidity < 10000) { score += 45; reasons.push("🔴 Liquidez muito baixa (< $10k)"); }
        else if (liquidity < 50000) { score += 30; reasons.push("🟠 Liquidez baixa (< $50k)"); }

        if (liquidity > 0 && volume24h / liquidity > 15) { 
          score += 25; reasons.push("🔴 Volume suspeito (possível wash trading)"); 
        }

        if (pairCreatedAt) {
          const ageHours = (Date.now() - pairCreatedAt) / (1000 * 60 * 60);
          if (ageHours < 6) { score += 20; reasons.push(`🔴 Token tem menos de 6 horas`); }
        }

        if (fdv > 5000000 && liquidity < 50000) { 
          score += 15; reasons.push("🟠 FDV alto com liquidez baixa"); 
        }

        if (tx24h < 50 && liquidity > 0) { 
          score += 10; reasons.push("🟠 Poucas transações (pode ser dead ou fake)"); 
        }

        score = Math.min(100, Math.max(0, score));

        // Cor e emoji
        let cor = score >= 70 ? "red" : score >= 40 ? "orange" : "emerald";
        let emoji = score >= 70 ? "☠️" : score >= 40 ? "⚠️" : "✅";
        let nivel = score >= 70 ? "ALTO RISCO (RUG)" : score >= 40 ? "RISCO MÉDIO" : "BAIXO RISCO";

        // HTML do resultado
        let html = `
          <div class="text-center">
            <h2 class="text-3xl font-bold">${tokenName} <span class="text-zinc-400">(${tokenSymbol})</span></h2>
            
            <div class="flex justify-center my-8">
              <div class="score-circle border-8 border-${cor}-500 bg-zinc-900 text-${cor}-400">
                ${score}
              </div>
            </div>
            
            <div class="text-2xl font-bold text-${cor}-400">${emoji} ${nivel}</div>
            
            <div class="mt-8 grid grid-cols-2 gap-6 text-left">
              <div><strong>Liquidez:</strong> $${liquidity.toLocaleString('pt-PT')}</div>
              <div><strong>Volume 24h:</strong> $${volume24h.toLocaleString('pt-PT')}</div>
              <div><strong>FDV:</strong> $${fdv.toLocaleString('pt-PT')}</div>
              <div><strong>Preço:</strong> $${parseFloat(price).toFixed(6)}</div>
            </div>

            <div class="mt-10">
              <h3 class="text-xl font-bold mb-4">🚩 Riscos Detetados</h3>
              ${reasons.length ? reasons.map(r => `<div class="bg-zinc-800 p-4 rounded-2xl mb-3">${r}</div>`).join('') : '<p class="text-emerald-400">Nenhum risco grave detetado.</p>'}
            </div>

            <div class="mt-8 bg-zinc-800 p-6 rounded-3xl text-sm">
              ⚠️ <strong>Aviso:</strong> Este checker usa apenas dados públicos da Dexscreener.<br>
              Verifica sempre mint authority, liquidez locked e top holders no Solscan!
            </div>
          </div>
        `;

        resultDiv.innerHTML = html;
        resultDiv.classList.remove('hidden');

      } catch (err) {
        resultDiv.innerHTML = `<div class="text-red-400 text-center text-xl">❌ ${err.message}<br><br>Tenta novamente ou verifica se o CA está correto.</div>`;
        resultDiv.classList.remove('hidden');
      }

      loading.classList.add('hidden');
    }

    // Permite pressionar Enter
    document.getElementById('caInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') analisarToken();
    });
  </script>
</body>
</html>
